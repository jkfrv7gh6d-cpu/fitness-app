// ─── PHOTOS SUR GOOGLE DRIVE ───────────────────────────────────────────────────
// Compresse une photo avant upload. Gère le cas HEIC/HEIF (iPhone) que <canvas>
// ne sait pas décoder : si le décodage échoue ou prend trop longtemps, on
// renvoie le fichier original tel quel plutôt que d'échouer.
async function compressPhoto(file){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    let resolved=false;
    img.onerror=()=>{
      if(resolved)return;resolved=true;
      URL.revokeObjectURL(url);resolve(file);
    };
    const timeout=setTimeout(()=>{
      if(resolved)return;resolved=true;
      URL.revokeObjectURL(url);resolve(file);
    },4000);
    img.onload=()=>{
      if(resolved)return;resolved=true;clearTimeout(timeout);
      const MAX=1200;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>{URL.revokeObjectURL(url);resolve(blob||file);},'image/jpeg',0.75);
    };
    img.src=url;
  });
}
// Le dossier photos vit dans le même espace privé (appDataFolder) que le reste
// des données de l'app — pas de nouveau scope OAuth à demander.
async function getOrCreateDriveFolder(folderName){
  if(driveFolderIdCache)return driveFolderIdCache;
  const q=encodeURIComponent(`name='${folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const searchRes=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id)`,{headers:{Authorization:'Bearer '+S.driveToken}});
  const searchData=await searchRes.json();
  if(searchData.files?.length>0){driveFolderIdCache=searchData.files[0].id;return driveFolderIdCache;}
  const createRes=await fetch('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{Authorization:'Bearer '+S.driveToken,'Content-Type':'application/json'},
    body:JSON.stringify({name:folderName,mimeType:'application/vnd.google-apps.folder',parents:['appDataFolder']})
  });
  const folder=await createRes.json();
  driveFolderIdCache=folder.id;
  return driveFolderIdCache;
}
async function uploadPhotoToDrive(photoFile,photoName){
  if(!S.driveToken)throw new Error('Non connecté à Google Drive');
  const folderId=await getOrCreateDriveFolder('fitness_app_photos');
  const metadata={name:photoName||`photo_${Date.now()}.jpg`,parents:[folderId]};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
  form.append('file',photoFile);
  const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,size',{
    method:'POST',headers:{Authorization:'Bearer '+S.driveToken},body:form
  });
  if(!res.ok)throw new Error(`Upload photo échoué : HTTP ${res.status}`);
  const result=await res.json();
  return result.id;
}
async function driveDeleteFile(fileId){
  if(!S.driveToken||!fileId)return;
  try{await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`,{method:'DELETE',headers:{Authorization:'Bearer '+S.driveToken}});}catch(e){}
}
function fileToDataURL(file){
  return new Promise(resolve=>{const r=new FileReader();r.onload=ev=>resolve(ev.target.result);r.readAsDataURL(file)});
}

// ─── FILE D'ATTENTE PHOTOS (upload différé quand Drive est indisponible) ──────
function getPendingUploads(){return JSON.parse(localStorage.getItem('pendingPhotoUploads')||'[]')}
function addToPendingUploads(localId,context,contextId,photoSlot){
  const pending=getPendingUploads();
  if(pending.find(p=>p.localId===localId))return;
  pending.push({localId,context,contextId,photoSlot,addedAt:Date.now()});
  localStorage.setItem('pendingPhotoUploads',JSON.stringify(pending));
}
function removeFromPendingUploads(localId){
  localStorage.setItem('pendingPhotoUploads',JSON.stringify(getPendingUploads().filter(p=>p.localId!==localId)));
}
function isPendingUpload(localId){return getPendingUploads().some(p=>p.localId===localId)}
function pendingBadgeHtml(localId){return isPendingUpload(localId)?`<div class="pending-badge" data-local="${localId}">📤</div>`:''}
function removePendingBadgeEl(localId){document.querySelectorAll(`.pending-badge[data-local="${localId}"]`).forEach(b=>b.remove())}

async function processPendingPhotoUploads(){
  if(!S.driveToken||isGoogleTokenExpired())return;
  const pending=getPendingUploads();
  if(!pending.length)return;
  const remaining=[];
  let anyUploaded=false;
  for(const item of pending){
    try{
      const dataUrl=await dbGet(item.localId);
      if(!dataUrl)continue; // blob introuvable → on retire de la file
      const blob=await(await fetch(dataUrl)).blob();
      const compressed=await compressPhoto(blob);
      const photoName=`${item.context}_${item.contextId}_${Date.now()}.jpg`;
      const driveId=await uploadPhotoToDrive(compressed,photoName);
      await cachePhoto(driveId,compressed,Date.now());
      if(item.context==='historique'){
        setPhotoRef(`${item.contextId}_${item.photoSlot}`,driveId);
      }else if(item.context==='recette'){
        const r=S.recettes.find(x=>x.id===item.contextId);
        if(r){r.photoId=driveId;r.photoLocal=false;}
      }
      removePendingBadgeEl(item.localId);
      anyUploaded=true;
    }catch(e){
      remaining.push(item); // échec → on réessaiera la prochaine fois
    }
  }
  localStorage.setItem('pendingPhotoUploads',JSON.stringify(remaining));
  if(anyUploaded){
    saveLocal();
    if(S.activeTab==='history')renderHistory();
    if(S.activeTab==='recettes')renderRecettes();
  }
}
async function drivePush(){
  if(!S.driveToken)return null;
  if(isLocalDataEmpty()){console.warn('Drive push annulé : données locales vides/par défaut.');return null;}
  const tokenOK=await ensureValidGoogleToken();
  if(!tokenOK){console.warn('Drive push annulé : token Google expiré, renouvellement échoué.');return null;}
  const lastSaved=parseInt(localStorage.getItem('fv_lastSaved')||'0');
  const photoRefs=JSON.parse(localStorage.getItem('fv_photo_refs')||'{}');
  const notes=JSON.parse(localStorage.getItem('fv_notes')||'{}');
  const body=JSON.stringify({foods:S.foods,history:S.history,settings:S.settings,mealsOn:S.mealsOn,mealsOff:S.mealsOff,dayType:S.dayType,photoMonths:S.photoMonths,recettes:S.recettes,photoRefs,notes,lastSaved});
  try{
    let fid=S.driveFileId||await driveFindFile();
    let resp;
    if(fid){
      resp=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media&fields=id`,{method:'PATCH',headers:{Authorization:'Bearer '+S.driveToken,'Content-Type':'application/json'},body});
    }else{
      const m=await(await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+S.driveToken,'Content-Type':'application/json'},body:JSON.stringify({name:'fitness_data.json',parents:['appDataFolder']})})).json();
      fid=m.id;S.driveFileId=fid;
      resp=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media&fields=id`,{method:'PATCH',headers:{Authorization:'Bearer '+S.driveToken,'Content-Type':'application/json'},body});
    }
    if(!resp.ok)return null;
    return await resp.json(); // {id,...} — confirmation officielle de l'upload par Drive
  }catch(e){console.warn('Drive push:',e);return null}
}
async function driveLoad(){
  if(!S.driveToken)return;
  try{
    const fid=S.driveFileId||await driveFindFile();
    if(!fid){
      // Aucun fichier sur Drive : on ne pousse que si on a de vraies données locales
      if(!isLocalDataEmpty())drivePush();
      return;
    }
    S.driveFileId=fid;
    const d=await(await fetch(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`,{headers:{Authorization:'Bearer '+S.driveToken}})).json();
    const driveTs=d?.lastSaved||0;
    const localTs=parseInt(localStorage.getItem('fv_lastSaved')||'0');
    const localEmpty=isLocalDataEmpty();
    if(localEmpty||driveTs>localTs){
      // Local vide (règle absolue), OU Drive plus récent → on applique ses données
      if(d.foods)S.foods=d.foods;if(d.history)S.history=d.history;
      if(d.settings)S.settings=d.settings;if(d.mealsOn)S.mealsOn=d.mealsOn;
      if(d.mealsOff)S.mealsOff=d.mealsOff;if(d.dayType)S.dayType=d.dayType;
      if(d.photoMonths)S.photoMonths=d.photoMonths;
      if(d.recettes)S.recettes=d.recettes;
      if(d.photoRefs)localStorage.setItem('fv_photo_refs',JSON.stringify(d.photoRefs));
      if(d.notes)localStorage.setItem('fv_notes',JSON.stringify(d.notes));
      saveLocal();
      renderTab(S.activeTab);
      console.log(localEmpty?'Données restaurées depuis Google Drive (local vide)':'Données restaurées depuis Google Drive (plus récentes)');
    }else{
      // Local plus récent ou égal, et non vide → on garde le local et on réuploade
      drivePush();
      console.log('Données locales conservées (plus récentes). Upload vers Drive.');
    }
  }catch(e){console.warn('Drive load:',e)}
}
function schedSync(){if(!S.driveToken)return;clearTimeout(S.syncTimer);S.syncTimer=setTimeout(drivePush,2000)}

// ─── SYNC MANUELLE AVEC VÉRIFICATION ──────────────────────────────────────────
function showSyncModal(state,data){
  const overlay=document.getElementById('sync-modal-overlay');
  const content=document.getElementById('sync-modal-content');
  overlay.style.display='flex';
  if(state==='loading'){
    content.innerHTML=`
      <div class="sync-spinner"></div>
      <div class="sync-modal-title">Synchronisation…</div>
      <div class="sync-modal-subtitle" style="margin-bottom:0">Envoi vers Google Drive</div>`;
  }else if(state==='success'){
    const s=data.semaines,m=data.moisPhotos,a=data.aliments,rc=data.recettes||0;
    content.innerHTML=`
      <div class="sync-modal-icon">✅</div>
      <div class="sync-modal-title">Synchronisation réussie</div>
      <div class="sync-modal-subtitle">Confirmé par Google Drive<br>Le ${data.timestamp}</div>
      <hr class="sync-modal-divider">
      <div class="sync-modal-stat">📅 ${s} semaine${s>1?'s':''} sauvegardée${s>1?'s':''}</div>
      <div class="sync-modal-stat">📸 ${m} mois de photos</div>
      <div class="sync-modal-stat">🥦 ${a} aliments</div>
      <div class="sync-modal-stat">📖 ${rc} recette${rc>1?'s':''}</div>
      <button class="sync-modal-btn primary" onclick="closeSyncModal()">Fermer</button>`;
  }else if(state==='error'){
    content.innerHTML=`
      <div class="sync-modal-icon">❌</div>
      <div class="sync-modal-title">Synchronisation échouée</div>
      <div class="sync-modal-subtitle">${data.reason}<br>Vos données locales sont intactes sur cet appareil.</div>
      <button class="sync-modal-btn danger" onclick="${data.showReconnect?'handleReconnectAndRetry()':'syncAndVerify()'}">Réessayer</button>
      <button class="sync-modal-btn secondary" onclick="closeSyncModal()">Fermer</button>`;
  }
}
function closeSyncModal(){document.getElementById('sync-modal-overlay').style.display='none';}

// Upload dédié à la sync manuelle : lève des erreurs précises (HTTP xxx, pas de
// token, pas d'id) au lieu de les avaler — drivePush() (auto-sync debounced)
// n'est pas touché, il garde son comportement silencieux existant.
async function drivePushVerified(){
  if(!S.driveToken)throw new Error('non connecté');
  const lastSaved=Date.now();
  localStorage.setItem('fv_lastSaved',String(lastSaved));
  const photoRefs=JSON.parse(localStorage.getItem('fv_photo_refs')||'{}');
  const notes=JSON.parse(localStorage.getItem('fv_notes')||'{}');
  const body=JSON.stringify({foods:S.foods,history:S.history,settings:S.settings,mealsOn:S.mealsOn,mealsOff:S.mealsOff,dayType:S.dayType,photoMonths:S.photoMonths,recettes:S.recettes,photoRefs,notes,lastSaved});
  let fid=S.driveFileId||await driveFindFile();
  if(!fid){
    const createResp=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+S.driveToken,'Content-Type':'application/json'},body:JSON.stringify({name:'fitness_data.json',parents:['appDataFolder']})});
    if(!createResp.ok)throw new Error(`HTTP ${createResp.status}`);
    const m=await createResp.json();
    fid=m.id;S.driveFileId=fid;
  }
  const resp=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media&fields=id`,{method:'PATCH',headers:{Authorization:'Bearer '+S.driveToken,'Content-Type':'application/json'},body});
  if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
  const result=await resp.json();
  if(!result?.id)throw new Error('Google Drive n\'a pas retourné d\'identifiant de fichier.');
  return result;
}
function mapSyncError(msg){
  msg=msg||'';
  if(msg.includes('non connecté'))return'Vous n\'êtes pas connecté à Google Drive. Connectez-vous d\'abord dans Paramètres.';
  if(msg.includes('HTTP 401')||msg.includes('HTTP 403'))return'Session expirée. Reconnectez-vous à Google Drive.';
  if(msg.includes('HTTP 500'))return'Erreur serveur Google. Réessayez dans quelques instants.';
  if(msg.includes('HTTP'))return`Échec de l'envoi vers Google Drive (${msg}). Réessayez.`;
  return msg||'Erreur inconnue. Vérifiez votre connexion internet.';
}
async function syncAndVerify(){
  showSyncModal('loading');
  // Sécurité absolue : ne jamais pousser des données vides/par défaut vers Drive
  // (écraserait une sauvegarde réelle, ex. après une réinstallation de l'app)
  if(isLocalDataEmpty()){
    showSyncModal('error',{reason:'Aucune donnée locale à synchroniser. Reconnectez-vous à Drive pour restaurer vos données.'});
    return;
  }
  try{
    if(!S.driveToken)throw new Error('non connecté');
    const tokenOK=await ensureValidGoogleToken();
    if(!tokenOK){
      showSyncModal('error',{reason:'Session Google expirée. Appuyez sur "Réessayer" pour vous reconnecter.',showReconnect:true});
      return;
    }
    const uploadResult=await drivePushVerified();
    localStorage.setItem('fv_drive_token_time',String(Date.now()));
    const stats={
      semaines:S.history.length,
      moisPhotos:S.photoMonths.length,
      aliments:S.foods.length,
      recettes:(S.recettes||[]).length,
      timestamp:new Date(parseInt(localStorage.getItem('fv_lastSaved')||'0')).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
    };
    showSyncModal('success',stats);
    processPendingPhotoUploads(); // profiter du token valide confirmé
  }catch(err){
    const reason=mapSyncError(err.message);
    const showReconnect=err.message&&(err.message.includes('HTTP 401')||err.message.includes('HTTP 403'));
    showSyncModal('error',{reason,showReconnect});
  }
}
