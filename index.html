<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitVincent">
<title>Fitness Vincent</title>
<style>
:root{
  --green:#30D158;--orange:#FF9F0A;--blue:#0A84FF;--red:#FF453A;--purple:#BF5AF2;
  --text:#fff;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.28);
  --glass:rgba(255,255,255,.08);--bdr:rgba(255,255,255,.14);
  --sh:0 8px 32px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.1);
  --ease:all .3s cubic-bezier(.25,.46,.45,.94);
  --r:20px;--rs:14px;
  --sb:env(safe-area-inset-bottom);--st:env(safe-area-inset-top);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none;margin:0;padding:0;height:100%;background:#0f0f1a;overflow:hidden}
body{font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;color:var(--text);font-size:16px}
input,select,textarea,button{font-family:inherit;font-size:16px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.6;cursor:pointer}

#app{position:fixed;top:0;right:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0f0f1a;overflow:hidden}

/* ─── TAB CONTENT (plein écran, padding-top géré en JS depuis le chip, padding-bottom fixe = hauteur du pill) ─── */
.tab-content{display:none;position:absolute;top:0;right:0;bottom:0;left:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 14px calc(80px + 16px)}
.tab-content.active{display:block}

/* ─── CHIP TITRE FLOTTANT ─── */
.page-title-chip{position:fixed;top:calc(env(safe-area-inset-top,0px) + 12px);left:20px;right:20px;z-index:999;background:rgba(18,18,30,.65);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.12);box-shadow:0 4px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);border-radius:16px;padding:10px 18px;display:flex;align-items:baseline;gap:10px;width:fit-content;max-width:calc(100% - 40px)}
.page-title-chip .tab-title{font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
.page-title-chip .tab-date{font-size:13px;color:rgba(255,255,255,.5);font-weight:400;white-space:nowrap}

/* ─── NAV PILL FLOTTANT ─── */
.nav-pill{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 8px);left:16px;right:16px;height:64px;border-radius:32px;z-index:1000;background:rgba(18,18,30,.65);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.12);box-shadow:0 8px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-around;padding:0 8px}
.nav-item{display:flex;align-items:center;justify-content:center;height:48px;border-radius:24px;border:none;background:transparent;cursor:pointer;transition:background .2s ease;flex:1}
.nav-item .nav-icon{font-size:22px;line-height:1}
.nav-item.active{background:rgba(255,255,255,.14)}
.nav-item:active{background:rgba(255,255,255,.08);transform:scale(.9)}

/* ─── CARD ─── */
.card{background:var(--glass);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:12px 20px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.11);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--text);font-size:16px;font-weight:600;cursor:pointer;transition:var(--ease)}
.btn:active{opacity:.7;transform:scale(.97)}
.btn-blue{background:var(--blue);border-color:var(--blue)}
.btn-red{background:var(--red);border-color:var(--red)}
.btn-green{background:var(--green);border-color:var(--green);color:#000}
.btn-full{width:100%}
.btn-sm{min-height:40px;padding:8px 14px;font-size:14px}

/* ─── TODAY ─── */
.day-toggle{display:flex;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:4px;margin-bottom:12px;gap:4px}
.dt-btn{flex:1;min-height:50px;border-radius:14px;border:none;background:transparent;color:var(--t2);font-size:15px;font-weight:700;cursor:pointer;transition:var(--ease);display:flex;align-items:center;justify-content:center;gap:6px}
.dt-btn.on{background:rgba(48,209,88,.18);color:var(--green);border:1px solid rgba(48,209,88,.35)}
.dt-btn.off{background:rgba(255,159,10,.18);color:var(--orange);border:1px solid rgba(255,159,10,.35)}

/* ─── GAUGES ─── */
.gauges-row{display:flex;justify-content:space-around;padding:14px 6px;margin-bottom:10px}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.gauge-ring{position:relative;width:72px;height:72px}
.gauge-ring svg{display:block}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.gauge-ico{font-size:14px;line-height:1}
.gauge-pct{font-size:11px;font-weight:700;line-height:1;margin-top:1px}
.gauge-sub{font-size:10px;color:var(--t2);text-align:center;line-height:1.3}
.gauge-name{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}

/* ─── MEAL CARDS ─── */
.meal-card{margin-bottom:10px;overflow:hidden}
.meal-hdr{display:flex;align-items:center;padding:13px 14px;cursor:pointer;gap:10px;min-height:62px;user-select:none;-webkit-user-select:none}
.meal-icon{font-size:20px;flex-shrink:0}
.meal-info{flex:1;min-width:0}
.meal-name{font-size:15px;font-weight:600;margin-bottom:2px}
.meal-kcal-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.meal-cur{font-size:17px;font-weight:700;color:var(--blue)}
.meal-tgt{font-size:12px;color:var(--t2)}
.tol{font-size:11px;font-weight:700;padding:2px 6px;border-radius:7px}
.tol-ok{background:rgba(48,209,88,.15);color:var(--green)}
.tol-warn{background:rgba(255,159,10,.15);color:var(--orange)}
.tol-over{background:rgba(255,69,58,.15);color:var(--red)}
.chev{font-size:11px;color:var(--t3);transition:transform .3s ease;flex-shrink:0}
.meal-card.open .chev{transform:rotate(180deg)}
.meal-body{display:none;padding:0 12px 12px}
.meal-card.open .meal-body{display:block}
.prog-wrap{height:3px;background:rgba(255,255,255,.07);margin:0 14px 0;overflow:hidden;border-radius:2px}
.prog{height:100%;border-radius:2px;transition:width .4s ease;max-width:100%}

/* ─── FOOD LINES ─── */
.food-line{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.food-line:last-of-type{border-bottom:none}
.fl-top{display:grid;grid-template-columns:58px 1fr 26px;gap:5px;align-items:center}
.fl-cat{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;line-height:1.3}
.fl-sel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:9px;color:var(--text);min-height:40px;width:100%;font-size:13px}
.fl-sel{padding:8px 6px;appearance:none;-webkit-appearance:none}
.fl-sel:focus{outline:none;border-color:var(--blue)}
.fl-rm{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:0;line-height:1;min-height:40px;display:flex;align-items:center;justify-content:center;width:26px}
.fl-rm:active{color:var(--red)}
.fl-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:6px;padding:5px 6px;background:rgba(255,255,255,.03);border-radius:7px}
.fl-mac{text-align:center}
.fl-mac-l{font-size:8px;color:var(--t3);text-transform:uppercase;font-weight:700}
.fl-mac-v{font-size:11px;font-weight:600;margin-top:1px}
.pc{color:#64D2FF}.gc{color:#FFD60A}.lc{color:var(--orange)}

/* Double champ g = kcal */
.dual-input-row{display:flex;align-items:center;gap:6px;margin-top:6px}
.input-field-wrap{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 8px;flex:1;transition:border-color .15s,background .15s;min-height:38px}
.input-field-wrap:focus-within{border-color:rgba(99,179,237,.6);background:rgba(99,179,237,.08)}
.input-field-wrap input{background:transparent;border:none;outline:none;color:#fff;font-size:13px;font-weight:600;width:100%;text-align:right}
.input-field-wrap input:disabled{color:var(--t3)}
.input-unit{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap;flex-shrink:0}
.input-sep{font-size:12px;color:rgba(255,255,255,.25);flex-shrink:0}

/* Add-line row */
.add-line-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,.05)}
.al-btn{padding:5px 9px;border-radius:9px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.05);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;min-height:30px;transition:var(--ease)}
.al-btn:active{opacity:.6}

/* ─── PLAN DE RÉFÉRENCE (Aujourd'hui) ─── */
.plan-reference-bar{display:flex;flex-direction:column;gap:10px;margin:24px 2px 8px;padding-bottom:8px}
.plan-ref-btn{width:100%;min-height:48px;padding:13px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.1);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s}
.plan-ref-btn:active{opacity:.7;transform:scale(.98)}
.plan-ref-btn.restaurer{background:rgba(255,255,255,.07);color:rgba(255,255,255,.75)}
.plan-ref-btn.enregistrer{background:rgba(48,209,88,.12);color:rgba(48,209,88,.9);border-color:rgba(48,209,88,.2)}

/* ─── FOODS TAB ─── */
.foods-sec{margin-bottom:16px}
.sec-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;padding:0 2px}
.food-outer{position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.05);background:#14141f}
.food-outer:last-child{border-bottom:none}
.food-inner{display:flex;align-items:center;padding:11px 14px;min-height:58px;background:#14141f;position:relative;z-index:1;transition:transform .3s ease}
.food-outer.swipe-open .food-inner{transform:translateX(-88px)}
.fr-main{flex:1;min-width:0}
.fr-name{font-size:15px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fr-kcal{font-size:13px;color:var(--orange);font-weight:600}
.fr-macs{font-size:12px;color:var(--t2)}
.fr-del{position:absolute;right:-88px;top:0;bottom:0;width:88px;background:var(--red);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;z-index:0;display:flex;align-items:center;justify-content:center;transition:right .3s ease}
.food-outer.swipe-open .fr-del{right:0}

.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 88px);right:20px;width:52px;height:52px;border-radius:26px;background:var(--blue);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(10,132,255,.45);display:flex;align-items:center;justify-content:center;transition:var(--ease);z-index:90}
.fab:active{transform:scale(.9)}

/* ─── RECETTES ─── */
.recettes-header{padding:2px 2px 14px;display:flex;justify-content:flex-end}
.btn-nouvelle-recette{background:rgba(48,209,88,.15);border:1px solid rgba(48,209,88,.3);color:var(--green);border-radius:20px;padding:10px 20px;font-size:15px;font-weight:600;cursor:pointer;min-height:44px}
.recettes-list{display:flex;flex-direction:column;gap:10px}
.recette-outer{position:relative;overflow:hidden;border-radius:16px}
.recette-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;position:relative;z-index:1;transition:transform .3s ease}
.recette-outer.swipe-open .recette-card{transform:translateX(-88px)}
.recette-del{position:absolute;right:-88px;top:0;bottom:0;width:88px;background:var(--red);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;z-index:0;transition:right .3s ease}
.recette-outer.swipe-open .recette-del{right:0}
.recette-card-photo{position:relative;width:56px;height:56px;border-radius:12px;background:rgba(255,255,255,.08);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px}
.recette-card-photo img{width:100%;height:100%;object-fit:cover}
.recette-card-info{flex:1;min-width:0}
.recette-card-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recette-card-macros{font-size:12px;color:var(--t2)}
.recette-card-arrow{color:var(--t3);font-size:20px}
.recettes-empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px;line-height:1.6}

.recette-detail-overlay{position:fixed;inset:0;background:#0f0f1a;z-index:1500;display:none;flex-direction:column}
.recette-detail-overlay.open{display:flex}
.recette-detail-header{display:flex;align-items:center;gap:10px;padding:calc(env(safe-area-inset-top,0px) + 14px) 14px 14px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08)}
.btn-back{background:rgba(255,255,255,.08);border:none;color:#fff;font-size:14px;font-weight:600;padding:9px 14px;border-radius:12px;cursor:pointer;min-height:40px;flex-shrink:0}
.recette-name-input{flex:1;background:transparent;border:none;color:#fff;font-size:17px;font-weight:700;text-align:center;outline:none;min-width:0}
.btn-save-recette{background:var(--green);border:none;color:#000;font-size:14px;font-weight:700;padding:9px 16px;border-radius:12px;cursor:pointer;min-height:40px;flex-shrink:0}
.recette-detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(env(safe-area-inset-bottom,0px) + 24px)}
.recette-photo-zone{margin-bottom:14px;height:200px;border-radius:16px;background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.recette-photo-zone img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.recette-photo-placeholder{color:var(--t2);font-size:14px}
.recette-photo-delete{position:absolute;top:8px;right:8px;z-index:5;background:rgba(0,0,0,.65);border:none;border-radius:50%;width:32px;height:32px;font-size:15px;cursor:pointer;color:#fff}
.recette-note-textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#fff;padding:14px;font-size:16px;resize:none;outline:none;font-family:inherit;margin-top:14px}
.recette-macros-total{display:flex;justify-content:space-around;background:rgba(255,255,255,.05);border-radius:14px;padding:14px;margin-bottom:14px;font-size:14px;font-weight:600;color:rgba(255,255,255,.85)}
.recette-ingredients-card{background:var(--glass);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);padding:4px 12px 12px;margin-bottom:14px}
.recette-ing-title{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;padding:12px 2px 8px}

/* ─── HISTORY ─── */
.chart-card{padding:14px;margin-bottom:12px}
.chart-title{font-size:15px;font-weight:700;margin-bottom:10px}
#weight-chart{width:100%;display:block;border-radius:8px}

/* Week cards with swipe */
.week-outer{position:relative;overflow:hidden;border-radius:var(--r);margin-bottom:10px}
.week-card{background:var(--glass);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:0;transition:transform .3s ease;position:relative;z-index:1}
.week-outer.swipe-open .week-card{transform:translateX(-100px)}
.week-del{position:absolute;right:-100px;top:0;bottom:0;width:100px;background:var(--red);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;z-index:0;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:right .3s ease}
.week-outer.swipe-open .week-del{right:0}
.week-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;min-height:54px}
.week-hdr-info{flex:1}
.week-date-lbl{font-size:15px;font-weight:700}
.week-wt-lbl{font-size:13px;color:var(--t2)}
.week-body{display:none;padding:0 13px 13px}
.week-card.open .week-body{display:block}
.week-macros-auto{background:rgba(255,255,255,.04);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.wma-item{text-align:center}
.wma-val{font-size:16px;font-weight:700}
.wma-lbl{font-size:10px;color:var(--t2);text-transform:uppercase}
.hist-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.hist-row:last-child{border-bottom:none}
.hist-lbl{flex:1;font-size:14px;color:var(--t2)}
.hist-inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:9px;color:var(--text);font-size:14px;font-weight:600;padding:7px 9px;text-align:right;min-height:40px;width:120px}
.hist-inp:focus{outline:none;border-color:var(--blue)}
.hist-sel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:9px;color:var(--text);font-size:14px;padding:7px 9px;min-height:40px;appearance:none;-webkit-appearance:none}

/* Month photos */
.month-outer{position:relative;overflow:hidden;border-radius:var(--r);margin-bottom:10px}
.month-card{background:var(--glass);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);transition:transform .3s ease;position:relative;z-index:1}
.month-outer.swipe-open .month-card{transform:translateX(-100px)}
.month-del{position:absolute;right:-100px;top:0;bottom:0;width:100px;background:var(--red);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;z-index:0;display:flex;align-items:center;justify-content:center;font-family:inherit;text-align:center;padding:8px;transition:right .3s ease}
.month-outer.swipe-open .month-del{right:0}
.month-name{font-size:16px;font-weight:700;padding:13px 14px 9px;display:flex;align-items:center;justify-content:space-between}
.photos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:0 13px}
.photo-slot{aspect-ratio:1;background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.14);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.photo-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.ps-lbl{font-size:11px;color:var(--t2);font-weight:600;z-index:1;position:relative}
.ps-ico{font-size:24px;margin-bottom:3px;z-index:1;position:relative}
.photo-trash{position:absolute;top:5px;right:5px;z-index:10;background:rgba(0,0,0,.65);border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.pending-badge{position:absolute;top:6px;right:6px;z-index:10;background:rgba(255,165,0,.85);border-radius:10px;padding:2px 6px;font-size:11px;font-weight:600;color:#fff}
.month-notes{display:block;width:calc(100% - 26px);margin:8px 13px 13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);border-radius:12px;padding:11px;color:var(--text);font-size:16px;resize:none;min-height:68px}
.month-notes:focus{outline:none;border-color:var(--blue)}

/* ─── SETTINGS ─── */
.set-sec{margin-bottom:18px}
.set-title{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;padding:0 2px}
.set-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);min-height:50px}
.set-row:last-child{border-bottom:none}
.set-lbl{flex:1;font-size:15px}
.set-inp{background:transparent;border:none;color:var(--text);font-size:16px;text-align:right;width:110px;min-height:40px}
.set-inp:focus{outline:none;color:var(--blue)}
.set-sel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:9px;color:var(--text);font-size:15px;padding:7px 9px;min-height:40px;appearance:none;-webkit-appearance:none}
.set-date{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:9px;color:var(--text);font-size:15px;padding:7px 9px;min-height:40px;width:130px}
.set-date:focus{outline:none;border-color:var(--blue)}

.targets-wrap{padding:8px 14px 12px;overflow-x:auto}
table.tgt{width:100%;border-collapse:collapse;min-width:200px}
table.tgt th{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;padding:5px 3px;text-align:center}
table.tgt th:first-child{text-align:left}
table.tgt td{padding:4px 3px;text-align:center}
table.tgt td:first-child{text-align:left;font-size:12px;color:var(--t2);padding-right:4px}
.tgt-inp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:8px;color:var(--text);font-size:14px;font-weight:700;padding:5px 3px;width:60px;text-align:center;min-height:36px}
.tgt-inp:focus{outline:none;border-color:var(--blue)}
.tgt-total{margin-top:2px;padding:12px 16px;background:rgba(255,255,255,.06);border-top:1px solid rgba(255,255,255,.1);font-weight:700;font-size:15px;color:var(--text);text-align:right;border-radius:0 0 var(--r) var(--r)}
.tgt-total span{font-weight:800;font-size:17px}

/* ─── COEFFICIENTS MACROS ─── */
.coef-group{background:rgba(255,255,255,.05);border-radius:14px;padding:12px 16px;margin-top:8px}
.coef-label-header{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.coef-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.coef-row:last-child{border-bottom:none}
.coef-row label{font-size:14px;color:rgba(255,255,255,.85)}
.coef-input-wrap{display:flex;align-items:center;gap:6px}
.coef-input-wrap input{width:60px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-size:15px;font-weight:600;text-align:center;padding:6px 8px;min-height:38px}
.coef-input-wrap input:focus{outline:none;border-color:var(--blue)}
.coef-unit{font-size:12px;color:rgba(255,255,255,.4);min-width:28px}
.coef-reset-btn{width:100%;margin-top:14px;padding:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;min-height:40px}

/* Macros auto block */
.macros-auto{padding:14px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ma-item{background:rgba(255,255,255,.05);border-radius:12px;padding:10px;text-align:center}
.ma-val{font-size:22px;font-weight:800;letter-spacing:-.5px}
.ma-lbl{font-size:11px;color:var(--t2);margin-top:2px}

/* Drive */
.drive-box{padding:14px;display:flex;flex-direction:column;gap:9px;align-items:center}
.drive-status{font-size:14px;color:var(--t2);text-align:center}
.drive-status.ok{color:var(--green)}

/* Stockage */
.storage-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.storage-label{font-size:15px;color:var(--text)}
.storage-value{font-size:14px;color:var(--t2);font-weight:600}
.storage-clear-btn{width:calc(100% - 28px);margin:10px 14px 4px;padding:11px;background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.25);border-radius:12px;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;min-height:44px}
.storage-note{padding:8px 14px 14px;font-size:12px;color:var(--t3);line-height:1.5}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{width:100%;max-width:430px;background:rgba(16,16,30,.97);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--bdr);border-radius:26px 26px 0 0;padding:18px 16px calc(18px + var(--sb));animation:su .3s cubic-bezier(.25,.46,.45,.94);max-height:88vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:4px;background:rgba(255,255,255,.16);border-radius:2px;margin:0 auto 16px}
.sh-title{font-size:19px;font-weight:700;margin-bottom:16px;text-align:center}
.mf{margin-bottom:12px}
.ml{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.mi{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:11px;color:var(--text);font-size:16px;padding:12px 13px;min-height:48px}
.mi:focus{outline:none;border-color:var(--blue)}
.mi-sel{appearance:none;-webkit-appearance:none}
.cat-pick{display:flex;gap:5px;flex-wrap:wrap}
.cpb{padding:7px 11px;border-radius:18px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.06);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;min-height:34px;transition:var(--ease)}
.cpb.active{background:rgba(10,132,255,.2);border-color:var(--blue);color:var(--blue)}
.m-actions{display:flex;gap:9px;margin-top:16px}
.m-actions .btn{flex:1}
.confirm-box{background:rgba(20,20,36,.98);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;max-width:290px;width:90%;margin:auto}
.confirm-msg{font-size:15px;font-weight:600;text-align:center;margin-bottom:16px;line-height:1.5;color:var(--text)}
.confirm-btns{display:flex;gap:9px}
.confirm-btns .btn{flex:1;min-height:44px}
.scroll-end{height:16px}

/* ─── SYNC VERIFICATION MODAL ─── */
.sync-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px}
.sync-modal{background:rgba(22,22,38,.92);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.12);border-radius:24px;box-shadow:0 16px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);padding:28px 24px;width:100%;max-width:340px;text-align:center;color:#fff}
.sync-modal-icon{font-size:40px;margin-bottom:12px}
.sync-modal-title{font-size:18px;font-weight:700;margin-bottom:8px}
.sync-modal-subtitle{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:16px;line-height:1.5}
.sync-modal-divider{border:none;border-top:1px solid rgba(255,255,255,.1);margin:16px 0}
.sync-modal-stat{font-size:14px;color:rgba(255,255,255,.8);margin:6px 0;text-align:left}
.sync-modal-btn{margin-top:20px;padding:12px 28px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;min-height:44px}
.sync-modal-btn.primary{background:var(--green);color:#fff}
.sync-modal-btn.secondary{background:rgba(255,255,255,.12);color:#fff;margin-left:8px}
.sync-modal-btn.danger{background:var(--red);color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-spinner{display:inline-block;width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}

</head>

// ─── UTILS ───────────────────────────────────────────────────────────────────
function tds(){return new Date().toISOString().split('T')[0]}
function fmtDate(s){
  if(!s)return'';
  // handle YYYY-MM-DD or DD/MM/YYYY
  let y,m,d;
  if(s.includes('-')&&s.length===10){[y,m,d]=s.split('-');}
  else if(s.includes('/')){const p=s.split('/');if(p.length===3){d=p[0];m=p[1];y=p[2];}}
  else return s;
  const mn=['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  return`${parseInt(d)} ${mn[parseInt(m)-1]} ${y}`;
}
function fmtFullDate(s){
  if(!s)return'';
  const[y,m,d]=s.split('-');
  const mn=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return`${parseInt(d)} ${mn[parseInt(m)-1]} ${y}`;
}
function nf(v,d=1){if(v==null||isNaN(v))return'—';return Number(v).toLocaleString('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d})}
function n0(v){if(v==null||isNaN(v))return'—';return Math.round(v).toLocaleString('fr-FR')}
// Remplace parseFloat() pour les valeurs venant d'inputs utilisateur : le clavier
// décimal iOS en français saisit une virgule que parseFloat() ne reconnaît pas.
function parseDecimal(val){
  if(val===null||val===undefined||val==='')return 0;
  return parseFloat(String(val).replace(',','.'))||0;
}
// Convertit la virgule en point en temps réel sur tous les champs inputmode="decimal"
function attachDecimalFix(){
  document.querySelectorAll('input[inputmode="decimal"]').forEach(input=>{
    if(input.dataset.decimalFixed)return;
    input.dataset.decimalFixed='1';
    input.addEventListener('input',function(){
      const cursorPos=this.selectionStart;
      const hadComma=this.value.includes(',');
      this.value=this.value.replace(',','.');
      if(hadComma)this.setSelectionRange(cursorPos,cursorPos);
    });
  });
}
// Sélection automatique au focus — champs numériques uniquement (pas les champs
// texte : nom, notes, recherche). Un seul listener global, fonctionne aussi pour
// les inputs créés dynamiquement après coup.
document.addEventListener('focusin',function(e){
  const input=e.target;
  if(input.tagName==='INPUT'&&(input.inputMode==='decimal'||input.inputMode==='numeric')){
    setTimeout(()=>{
      try{
        input.select();
        input.setSelectionRange(0,input.value.length);
      }catch(err){}
    },50);
  }
});
function dc(o){return JSON.parse(JSON.stringify(o))}
function gf(id){return S.foods.find(f=>f.id===id)||null}
function cm(foodId,kcal){
  const f=gf(foodId);if(!f||!kcal)return{gram:0,prot:0,gluc:0,lip:0};
  const g=(kcal/f.kcal)*100;return{gram:g,prot:g/100*f.prot,gluc:g/100*f.gluc,lip:g/100*f.lip};
}
// Détecte un état local "jamais configuré" (fraîchement installé / réinitialisé) :
// aucun historique, aucune recette, aucun aliment ajouté au-delà de la base par
// défaut, et des paramètres encore à leurs valeurs par défaut. Sert de garde-fou
// pour ne JAMAIS écraser des données Drive réelles avec un état vide/par défaut.
function isLocalDataEmpty(){
  const noHistory=!(S.history&&S.history.length>0);
  const noRecettes=!(S.recettes&&S.recettes.length>0);
  const noCustomFoods=(S.foods||[]).length<=FD_DEFAULT.length;
  const settingsAreDefault=!!(S.settings&&S.settings.weight===DS.weight&&S.settings.objective===DS.objective&&!S.settings.lastUpdate);
  return noHistory&&noRecettes&&noCustomFoods&&settingsAreDefault;
}
function calcDailyMacros(){
  const w=parseFloat(S.settings.weight)||0;
  const obj=S.settings.objective||'Prise de masse';
  const coef=getCoefs()[obj]||DEFAULT_COEFS['Maintien'];
  const P=w*coef,L=w*getLipCoef();
  const kcalON=S.settings.targetsOn.reduce((s,t)=>s+(t.kcal||0),0);
  const kcalOFF=S.settings.targetsOff.reduce((s,t)=>s+(t.kcal||0),0);
  const G_ON=Math.max(0,(kcalON-P*4-L*9)/4);
  const G_OFF=Math.max(0,(kcalOFF-P*4-L*9)/4);
  return{P,L,G_ON,G_OFF,kcalON,kcalOFF};
}

function loadLocal(){
  S.foods=JSON.parse(localStorage.getItem('fv_foods')||'null')||dc(FD_DEFAULT);
  S.history=JSON.parse(localStorage.getItem('fv_history')||'[]');
  S.settings=JSON.parse(localStorage.getItem('fv_settings')||'null')||dc(DS);
  // Migration : ajouter la cible "Glace du soir" si absente (versions antérieures)
  if(!S.settings.targetsOn.find(t=>t.name==='Glace du soir'))S.settings.targetsOn.push({name:'Glace du soir',kcal:0});
  if(!S.settings.targetsOff.find(t=>t.name==='Glace du soir'))S.settings.targetsOff.push({name:'Glace du soir',kcal:0});
  S.photoMonths=JSON.parse(localStorage.getItem('fv_photoMonths')||'[]');
  S.recettes=JSON.parse(localStorage.getItem('fv_recettes')||'[]');
  // Always load last saved state (no date-based reset)
  const saved=JSON.parse(localStorage.getItem('fv_today')||'null');
  if(saved&&saved.mealsOn&&saved.mealsOff){
    S.dayType=saved.dayType||'ON';S.mealsOn=saved.mealsOn;S.mealsOff=saved.mealsOff;
  }else{
    S.dayType='ON';S.mealsOn=dc(TPL_ON);S.mealsOff=dc(TPL_OFF);
  }
  // Migration : ajouter les repas de template manquants (ex: Glace du soir) aux états déjà sauvegardés
  TPL_ON.forEach(tm=>{if(!S.mealsOn.find(m=>m.id===tm.id))S.mealsOn.push(dc(tm));});
  TPL_OFF.forEach(tm=>{if(!S.mealsOff.find(m=>m.id===tm.id))S.mealsOff.push(dc(tm));});
  // Restore Drive token
  const tok=localStorage.getItem('fv_drive_token');
  if(tok){
    S.driveToken=tok;
    // Migration : anciennes sessions sans le flag driveConnected
    if(!localStorage.getItem('driveConnected'))localStorage.setItem('driveConnected','true');
  }
}

function initDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('FitnessVincent',2);
    r.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('photos'))db.createObjectStore('photos');
      if(!db.objectStoreNames.contains('photoCache'))db.createObjectStore('photoCache',{keyPath:'driveFileId'});
    };
    r.onsuccess=e=>{DB=e.target.result;res()};r.onerror=()=>rej(r.error);
  });
}
function dbPut(k,v){return new Promise(res=>{const tx=DB.transaction('photos','readwrite');tx.objectStore('photos').put(v,k);tx.oncomplete=res})}
function dbGet(k){return new Promise(res=>{const r=DB.transaction('photos','readonly').objectStore('photos').get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null)})}
function dbDelete(k){return new Promise(res=>{const tx=DB.transaction('photos','readwrite');tx.objectStore('photos').delete(k);tx.oncomplete=res})}

// ─── CACHE PHOTOS (Drive) ──────────────────────────────────────────────────────
function getPhotoFromCache(driveFileId){
  return new Promise(res=>{
    const r=DB.transaction('photoCache','readonly').objectStore('photoCache').get(driveFileId);
    r.onsuccess=()=>res(r.result?URL.createObjectURL(r.result.blob):null);
    r.onerror=()=>res(null);
  });
}
function cachePhoto(driveFileId,blob,cachedAt){
  return new Promise(res=>{const tx=DB.transaction('photoCache','readwrite');tx.objectStore('photoCache').put({driveFileId,blob,cachedAt});tx.oncomplete=res});
}
function clearPhotoCache(){
  return new Promise(res=>{const tx=DB.transaction('photoCache','readwrite');tx.objectStore('photoCache').clear();tx.oncomplete=res});
}
async function cleanOldPhotoCache(){
  const THREE_MONTHS=90*24*60*60*1000;
  const cutoff=Date.now()-THREE_MONTHS;
  return new Promise(res=>{
    const tx=DB.transaction('photoCache','readwrite');
    const store=tx.objectStore('photoCache');
    const req=store.openCursor();
    req.onsuccess=e=>{
      const cursor=e.target.result;
      if(cursor){
        if((cursor.value.cachedAt||0)<cutoff)cursor.delete();
        cursor.continue();
      }
    };
    tx.oncomplete=res;
  });
}
async function getPhotoCacheSizeMB(){
  return new Promise(res=>{
    let total=0;
    const tx=DB.transaction('photoCache','readonly');
    const req=tx.objectStore('photoCache').openCursor();
    req.onsuccess=e=>{
      const cursor=e.target.result;
      if(cursor){total+=cursor.value.blob?.size||0;cursor.continue();}
      else res(total/(1024*1024));
    };
    req.onerror=()=>res(0);
  });
}
async function loadPhoto(driveFileId){
  if(!driveFileId)return null;
  const cached=await getPhotoFromCache(driveFileId);
  if(cached)return cached;
  try{
    if(!S.driveToken)return null;
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{headers:{Authorization:'Bearer '+S.driveToken}});
    if(!res.ok)return null;
    const blob=await res.blob();
    await cachePhoto(driveFileId,blob,Date.now());
    return URL.createObjectURL(blob);
  }catch{return null}
}

function todayTotals(){
  const meals=S.dayType==='ON'?S.mealsOn:S.mealsOff;
  let tK=0,tP=0,tG=0,tL=0;
  meals.forEach(m=>m.lines.forEach(l=>{
    tK+=(l.kcal||0);
    if(l.foodId&&l.kcal){const r=cm(l.foodId,l.kcal);tP+=r.prot;tG+=r.gluc;tL+=r.lip;}
  }));
  return{tK,tP,tG,tL};
}
function gaugesBlockHtml(){
  const{tK,tP,tG,tL}=todayTotals();
  const dm=calcDailyMacros();
  const kcalTgt=S.dayType==='ON'?dm.kcalON:dm.kcalOFF;
  const gTgt=S.dayType==='ON'?dm.G_ON:dm.G_OFF;
  return`${gaugeHtml('g-kcal','🔥',tK,kcalTgt,' kcal','Calories')}
    ${gaugeHtml('g-prot','💪',tP,dm.P,'g','Protéines')}
    ${gaugeHtml('g-gluc','🌾',tG,gTgt,'g','Glucides')}
    ${gaugeHtml('g-lip','🥑',tL,dm.L,'g','Lipides')}`;
}
// Source unique de vérité pour la cible kcal d'un repas : S.settings (jamais
// meal.targetKcal, qui peut rester périmé après une modif dans Paramètres ou
// une restauration depuis Drive/plan de référence/template).
function getMealTargetKcal(meal){
  const arr=S.dayType==='ON'?S.settings.targetsOn:S.settings.targetsOff;
  const t=(arr||[]).find(x=>x.name===meal.name);
  return t?.kcal??null;
}
function mealHeaderHtml(meal){
  const mK=meal.lines.reduce((s,l)=>s+(l.kcal||0),0);
  const tgKcal=getMealTargetKcal(meal);
  const hasTarget=tgKcal!=null&&tgKcal>0;
  const diff=hasTarget?mK-tgKcal:0;
  const ok=Math.abs(diff)<=15;
  const tolHtml=hasTarget&&mK>0?`<span class="tol ${ok?'tol-ok':diff>0?'tol-over':'tol-warn'}">${ok?'✅':diff>0?`⚠️ +${Math.round(diff)}`:`⚠️ ${Math.round(diff)}`}</span>`:'';
  return`<span class="meal-cur">${n0(mK)}</span>
    ${hasTarget?`<span class="meal-tgt">/ ${n0(tgKcal)} kcal</span>${tolHtml}`:`<span class="meal-tgt">kcal · optionnel</span>`}`;
}
function mealProgHtml(meal){
  const mK=meal.lines.reduce((s,l)=>s+(l.kcal||0),0);
  const tgKcal=getMealTargetKcal(meal);
  const hasTarget=tgKcal!=null&&tgKcal>0;
  if(!hasTarget)return'';
  const diff=mK-tgKcal;
  const ok=Math.abs(diff)<=15;
  const prog=Math.min(100,(mK/tgKcal)*100);
  const progColor=ok&&mK>0?'var(--green)':mK>tgKcal?'var(--red)':'var(--blue)';
  return`<div class="prog-wrap"><div class="prog" style="width:${prog}%;background:${progColor}"></div></div>`;
}
function foodLineMacrosHtml(mac){
  return`<div class="fl-mac"><div class="fl-mac-l">g</div><div class="fl-mac-v" data-k="gram">${mac?nf(mac.gram,1):''}</div></div>
    <div class="fl-mac"><div class="fl-mac-l" style="color:#64D2FF">P</div><div class="fl-mac-v pc" data-k="prot">${mac?nf(mac.prot,1):''}</div></div>
    <div class="fl-mac"><div class="fl-mac-l" style="color:#FFD60A">G</div><div class="fl-mac-v gc" data-k="gluc">${mac?nf(mac.gluc,1):''}</div></div>
    <div class="fl-mac"><div class="fl-mac-l" style="color:var(--orange)">L</div><div class="fl-mac-v lc" data-k="lip">${mac?nf(mac.lip,1):''}</div></div>`;
}
// Aujourd'hui : kcal = valeur de référence sauvegardée (line.kcal). Les grammes
// sont dérivés à la volée pour l'affichage, jamais stockés.
function todayDualInputHtml(mealId,line){
  const food=gf(line.foodId);
  const kcalPer100=food?food.kcal:0;
  const canGrams=!!(food&&kcalPer100>0);
  const gramsVal=canGrams&&line.kcal?nf((line.kcal/kcalPer100)*100,1):'';
  return`<div class="dual-input-row">
    <div class="input-field-wrap">
      <input class="grams-input" type="text" inputmode="decimal" pattern="[0-9.,]*" value="${gramsVal}" placeholder="${canGrams?'0':'—'}"
        data-meal="${mealId}" data-line="${line.id}" oninput="onGramsChangeToday(this)"${canGrams?'':' disabled'}>
      <span class="input-unit">g</span>
    </div>
    <span class="input-sep">=</span>
    <div class="input-field-wrap">
      <input class="kcal-input" type="text" inputmode="decimal" pattern="[0-9.,]*" value="${line.kcal||''}" placeholder="0"
        data-meal="${mealId}" data-line="${line.id}" oninput="onKC(this)">
      <span class="input-unit">kcal</span>
    </div>
  </div>`;
}
// Ne remplace jamais la valeur du champ actuellement focalisé — seulement son
// jumeau (grams ou kcal), pour ne jamais perdre le focus/clavier iOS.
function updateTodaySiblingInput(mealId,lineId,which){
  const{line}=getML(mealId,lineId);
  if(!line)return;
  const food=gf(line.foodId);
  const canGrams=!!(food&&food.kcal>0);
  if(which==='grams'){
    const el=document.querySelector(`.grams-input[data-meal="${mealId}"][data-line="${lineId}"]`);
    if(!el)return;
    el.disabled=!canGrams;
    el.value=canGrams&&line.kcal?nf((line.kcal/food.kcal)*100,1):'';
  }else{
    const el=document.querySelector(`.kcal-input[data-meal="${mealId}"][data-line="${lineId}"]`);
    if(el)el.value=line.kcal||'';
  }
}
function renderToday(){
  const meals=S.dayType==='ON'?S.mealsOn:S.mealsOff;

  let html=`
  <div class="day-toggle">
    <button class="dt-btn${S.dayType==='ON'?' on':''}" onclick="setDT('ON')">☀️ JOUR ON</button>
    <button class="dt-btn${S.dayType==='OFF'?' off':''}" onclick="setDT('OFF')">🌙 JOUR OFF</button>
  </div>
  <div class="card" style="margin-bottom:10px">
    <div class="gauges-row" id="today-gauges">${gaugesBlockHtml()}</div>
  </div>`;

  meals.forEach(meal=>{
    html+=`<div class="card meal-card" id="meal-${meal.id}">
      <div class="meal-hdr" onclick="toggleMeal('${meal.id}')">
        <span class="meal-icon">${meal.icon}</span>
        <div class="meal-info">
          <div class="meal-name">${meal.name}</div>
          <div class="meal-kcal-row" id="mhead-${meal.id}">${mealHeaderHtml(meal)}</div>
        </div><span class="chev">▼</span>
      </div>

      const opts=S.foods.filter(f=>f.cat===line.cat).map(f=>`<option value="${f.id}"${f.id===line.foodId?' selected':''}>${f.name}</option>`).join('');
      html+=`<div class="food-line">
        <div class="fl-top">
          <div class="fl-cat">${line.cat}</div>
          <select class="fl-sel" data-meal="${meal.id}" data-line="${line.id}" onchange="onFC(this)">
            <option value="">—</option>${opts}
          </select>
          <button class="fl-rm" onclick="removeLine('${meal.id}','${line.id}')">×</button>
        </div>
        ${todayDualInputHtml(meal.id,line)}
        <div class="fl-macros" id="mac-${meal.id}-${line.id}" style="display:${mac?'grid':'none'}">${foodLineMacrosHtml(mac)}</div>
      </div>`;
    });

    html+=`<div class="add-line-row">
      ${CATS.map(cat=>`<button class="al-btn" onclick="addLine('${meal.id}','${cat}')">＋${cat==='Protéine'?'Prot':cat==='Glucide'?'Gluc':cat==='Légume'?'Légume':cat==='Lipide'?'Lip':cat==='Fruit'?'Fruit':'Dessert'}</button>`).join('')}
    </div></div></div>`;
  });
  html+=`<div class="plan-reference-bar">
    <button id="btn-restaurer-plan" class="plan-ref-btn restaurer" onclick="restaurerPlan()">↩ Restaurer mon plan</button>
    <button id="btn-enregistrer-plan" class="plan-ref-btn enregistrer" onclick="enregistrerPlan()">💾 Enregistrer comme plan habituel</button>
  </div>`;
  html+=`<div class="scroll-end"></div>`;
  document.getElementById('tab-today').innerHTML=html;
  attachDecimalFix();
}

function gaugeHtml(id,ico,cur,tgt,unit,name){
  const ratio=tgt>0?cur/tgt:0;
  const pct=Math.min(ratio,1);
  const c=188.5; // 2π×30
  const offset=c*(1-pct);
  const col=ratio<0.5?'#0A84FF':ratio<0.85?'#30D158':ratio<=1?'#FF9F0A':'#FF453A';
  return`<div class="gauge-wrap" id="${id}">
    <div class="gauge-ring">
      <svg viewBox="0 0 72 72" width="72" height="72">
        <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5.5"/>
        <circle cx="36" cy="36" r="30" fill="none" stroke="${col}" stroke-width="5.5"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
          transform="rotate(-90 36 36)"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-ico">${ico}</div>
        <div class="gauge-pct" style="color:${col}">${Math.round(ratio*100)}%</div>
      </div>
    </div>
    <div class="gauge-sub">${n0(cur)} / ${n0(tgt)}${unit}</div>
    <div class="gauge-name">${name}</div>
  </div>`;
}

function setDT(t){S.dayType=t;saveLocal();renderToday()}
function toggleMeal(id){document.getElementById('meal-'+id)?.classList.toggle('open')}

function getML(mId,lId){
  const ms=S.dayType==='ON'?S.mealsOn:S.mealsOff;
  const m=ms.find(x=>x.id===mId);
  return{meal:m,line:m?.lines.find(l=>l.id===lId)};
}
// Met à jour uniquement les éléments d'affichage concernés (jamais les inputs/select
// eux-mêmes) : la ligne ne perd jamais le focus, le clavier iOS ne se ferme pas.
function refreshTodayCalcs(mealId,lineId){
  const{meal,line}=getML(mealId,lineId);
  if(!meal)return;
  if(line){
    const mac=line.foodId&&line.kcal?cm(line.foodId,line.kcal):null;
    const box=document.getElementById(`mac-${mealId}-${lineId}`);
    if(box){
      box.style.display=mac?'grid':'none';
      box.innerHTML=foodLineMacrosHtml(mac);
    }
  }
  const head=document.getElementById(`mhead-${mealId}`);
  if(head)head.innerHTML=mealHeaderHtml(meal);
  const prog=document.getElementById(`mprog-${mealId}`);
  if(prog)prog.innerHTML=mealProgHtml(meal);
  const gauges=document.getElementById('today-gauges');
  if(gauges)gauges.innerHTML=gaugesBlockHtml();
}
function onFC(sel){
  const{line}=getML(sel.dataset.meal,sel.dataset.line);
  if(!line)return;
  line.foodId=sel.value||null;
  saveLocal();
  updateTodaySiblingInput(sel.dataset.meal,sel.dataset.line,'grams');
  refreshTodayCalcs(sel.dataset.meal,sel.dataset.line);
}
function onKC(inp){
  const{line}=getML(inp.dataset.meal,inp.dataset.line);
  if(!line)return;
  line.kcal=parseDecimal(inp.value);
  saveLocal(); // immediate save — kcal reste la valeur stockée
  updateTodaySiblingInput(inp.dataset.meal,inp.dataset.line,'grams');
  refreshTodayCalcs(inp.dataset.meal,inp.dataset.line);
}
// Champ grammes (dérivé) modifié → recalcule et sauvegarde le kcal correspondant
function onGramsChangeToday(inp){
  const{line}=getML(inp.dataset.meal,inp.dataset.line);
  if(!line)return;
  const food=gf(line.foodId);
  if(!food||!food.kcal)return; // désactivé dans ce cas, garde-fou
  const g=parseDecimal(inp.value);
  line.kcal=Math.round(g/100*food.kcal);
  saveLocal();
  updateTodaySiblingInput(inp.dataset.meal,inp.dataset.line,'kcal');
  refreshTodayCalcs(inp.dataset.meal,inp.dataset.line);
}
function addLine(mealId,cat){
  const ms=S.dayType==='ON'?S.mealsOn:S.mealsOff;
  const m=ms.find(x=>x.id===mealId);if(!m)return;
  m.lines.push({id:'l_'+Date.now(),cat,foodId:null,kcal:0});
  saveLocal();
  const opens=getOpenMeals();
  renderToday();
  restoreOpenMeals([...opens,mealId]);
}
function removeLine(mealId,lineId){
  const ms=S.dayType==='ON'?S.mealsOn:S.mealsOff;
  const m=ms.find(x=>x.id===mealId);if(!m)return;
  const i=m.lines.findIndex(l=>l.id===lineId);
  if(i>-1)m.lines.splice(i,1);
  saveLocal();
  const opens=getOpenMeals();
  renderToday();
  restoreOpenMeals(opens);
}
function getOpenMeals(){return[...document.querySelectorAll('.meal-card.open')].map(el=>el.id.replace('meal-',''))}
function restoreOpenMeals(ids){ids.forEach(id=>document.getElementById('meal-'+id)?.classList.add('open'))}

function renderFoods(){
  let html='';
  CATS.forEach(cat=>{
    const foods=S.foods.filter(f=>f.cat===cat);if(!foods.length)return;
    html+=`<div class="foods-sec"><div class="sec-hdr" style="color:${CAT_CLR[cat]}">${cat}</div><div class="card" style="overflow:hidden">`;
    foods.forEach(f=>{
      html+=`<div class="food-outer" data-fid="${f.id}">
        <div class="food-inner">
          <div class="fr-main">
            <div class="fr-name">${f.name}</div>
            <div class="fr-kcal">${nf(f.kcal,0)} kcal/100g</div>
            <div class="fr-macs">P ${nf(f.prot,1)}g · G ${nf(f.gluc,1)}g · L ${nf(f.lip,1)}g</div>
          </div>
        </div>
        <button class="fr-del" onclick="confirmDel('${f.id}','${f.name.replace(/'/g,"\\'")}')">Supprimer</button>
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`<div class="scroll-end"></div>`;
  document.getElementById('tab-foods').innerHTML=html;

  document.querySelectorAll('.food-outer').forEach(outer=>{
    let sx=0,swiping=false;
    const inner=outer.querySelector('.food-inner');
    outer.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;swiping=false},{passive:true});
    outer.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-sx;
      if(Math.abs(dx)>8)swiping=true;
      if(dx<-38){outer.classList.add('swipe-open');}
      else if(dx>10){outer.classList.remove('swipe-open');}
    },{passive:true});
    outer.addEventListener('touchend',()=>{});
    // Tap sur la zone principale (hors swipe) → ouvre l'édition. Indépendant du swipe.
    inner.addEventListener('click',()=>{
      if(swiping)return;
      if(outer.classList.contains('swipe-open')){outer.classList.remove('swipe-open');return;}
      openEditFood(outer.dataset.fid);
    });
  });
  document.getElementById('tab-foods').addEventListener('touchstart',e=>{
    if(!e.target.closest('.food-outer'))document.querySelectorAll('.food-outer.swipe-open').forEach(r=>r.classList.remove('swipe-open'));
  },{passive:true});
}

let _aC='Protéine';
let _editFoodId=null;
function openAddFood(){
  _aC='Protéine';_editFoodId=null;
  document.getElementById('food-modal-title').textContent='Ajouter un aliment';
  ['f-name','f-kcal','f-gluc','f-lip','f-prot'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('.cpb').forEach(b=>b.classList.toggle('active',b.dataset.cat===_aC));
  document.getElementById('modal-food').classList.add('open');
}
function openEditFood(id){
  const f=gf(id);if(!f)return;
  _aC=f.cat;_editFoodId=id;
  document.getElementById('food-modal-title').textContent='Modifier l\'aliment';
  document.getElementById('f-name').value=f.name;
  document.getElementById('f-kcal').value=f.kcal;
  document.getElementById('f-gluc').value=f.gluc;
  document.getElementById('f-lip').value=f.lip;
  document.getElementById('f-prot').value=f.prot;
  document.querySelectorAll('.cpb').forEach(b=>b.classList.toggle('active',b.dataset.cat===_aC));

document.querySelectorAll('.cpb').forEach(b=>b.addEventListener('click',()=>{
  _aC=b.dataset.cat;document.querySelectorAll('.cpb').forEach(x=>x.classList.toggle('active',x===b));
}));
function saveFood(){
  const name=document.getElementById('f-name').value.trim();
  const kcal=parseDecimal(document.getElementById('f-kcal').value);
  if(!name||!kcal){alert('Nom et kcal obligatoires');return;}
  const vals={name,cat:_aC,kcal,
    gluc:parseDecimal(document.getElementById('f-gluc').value),
    lip:parseDecimal(document.getElementById('f-lip').value),
    prot:parseDecimal(document.getElementById('f-prot').value)};
  if(_editFoodId){
    const f=gf(_editFoodId);
    if(f)Object.assign(f,vals);
  }else{
    S.foods.push({id:'c_'+Date.now(),...vals});
  }
  saveLocal();closeModal('modal-food');renderFoods();
}
function confirmDel(id,name){
  showConfirm(`Supprimer "${name}" ?`,()=>{
    S.foods.splice(S.foods.findIndex(f=>f.id===id),1);
    saveLocal();renderFoods();
  });
}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function showConfirm(msg,cb){
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-ok').onclick=()=>{cb();closeModal('modal-confirm')};
  document.getElementById('modal-confirm').classList.add('open');
}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));

// Comme cm() mais depuis un grammage saisi directement (au lieu de kcal saisies)
function cmFromGrams(foodId,grams){
  const f=gf(foodId);if(!f||!grams)return{kcal:0,prot:0,gluc:0,lip:0};
  return{kcal:grams/100*f.kcal,prot:grams/100*f.prot,gluc:grams/100*f.gluc,lip:grams/100*f.lip};
}
let _recetteEdit=null; // état d'édition en cours (null quand l'overlay est fermé)

function renderRecettes(){
  const list=S.recettes||[];
  let html=`<div class="recettes-header"><button class="btn-nouvelle-recette" onclick="openNewRecette()">+ Nouvelle recette</button></div>`;
  if(!list.length){
    html+=`<div class="recettes-empty"><p>Aucune recette enregistrée</p><p>Appuyez sur "+ Nouvelle recette" pour commencer</p></div>`;

    });
    html+=`</div>`;
  }
  html+=`<div class="scroll-end"></div>`;
  document.getElementById('tab-recettes').innerHTML=html;

  // Tap carte → édition, swipe gauche → supprimer (même mécanique qu'Aliments)
  document.querySelectorAll('.recette-outer').forEach(outer=>{
    let sx=0,swiping=false;
    const card=outer.querySelector('.recette-card');
    outer.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;swiping=false},{passive:true});
    outer.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-sx;
      if(Math.abs(dx)>8)swiping=true;
      if(dx<-38)outer.classList.add('swipe-open');
      else if(dx>10)outer.classList.remove('swipe-open');
    },{passive:true});
    card.addEventListener('click',()=>{
      if(swiping)return;
      if(outer.classList.contains('swipe-open')){outer.classList.remove('swipe-open');return;}
      openEditRecette(outer.dataset.rid);

function confirmDelRecette(id){
  showConfirm('Supprimer cette recette ?',()=>{
    const r=S.recettes.find(x=>x.id===id);

    saveLocal();renderRecettes();
  });
}

function setRecettePhotoPreview(url,pending){
  const zone=document.getElementById('recette-photo-zone');
  document.getElementById('recette-photo-placeholder').style.display='none';
  document.getElementById('btn-delete-recette-photo').style.display='flex';
  let img=zone.querySelector('img');

  img.src=url;

  if(existingBadge)existingBadge.remove();
  if(pending){
    const badge=document.createElement('div');
    badge.className='pending-badge';
    badge.textContent='📤';
    zone.appendChild(badge);
  }
}

    <div class="fl-mac"><div class="fl-mac-l" style="color:#FFD60A">G</div><div class="fl-mac-v gc" data-k="gluc">${mac?nf(mac.gluc,1):''}</div></div>
    <div class="fl-mac"><div class="fl-mac-l" style="color:var(--orange)">L</div><div class="fl-mac-v lc" data-k="lip">${mac?nf(mac.lip,1):''}</div></div>`;
}
// Recettes : grammes = valeur de référence sauvegardée (ing.grams). Le kcal
// est dérivé à la volée pour l'affichage, jamais stocké.
function recIngDualInputHtml(ing){
  const food=gf(ing.foodId);
  const kcalPer100=food?food.kcal:0;
  const canKcal=!!(food&&kcalPer100>0);
  const kcalVal=canKcal&&ing.grams?n0(ing.grams/100*kcalPer100):'';
  return`<div class="dual-input-row">
    <div class="input-field-wrap">

      <span class="input-unit">kcal</span>

function renderRecetteIngredients(){
  const wrap=document.getElementById('recette-ing-list');
  wrap.innerHTML=_recetteEdit.ingredients.map(ing=>{
    const mac=ing.foodId&&ing.grams?cmFromGrams(ing.foodId,ing.grams):null;
    const opts=S.foods.filter(f=>f.cat===ing.cat).map(f=>`<option value="${f.id}"${f.id===ing.foodId?' selected':''}>${f.name}</option>`).join('');
    return`<div class="food-line">
      <div class="fl-top">
        <div class="fl-cat">${ing.cat}</div>
        <select class="fl-sel" data-lid="${ing.id}" onchange="onRecIngFood(this)"><option value="">—</option>${opts}</select>
        <button class="fl-rm" onclick="removeRecetteIngredient('${ing.id}')">×</button>
      </div>
      ${recIngDualInputHtml(ing)}
      <div class="fl-macros" id="rmac-${ing.id}" style="display:${mac?'grid':'none'}">${recIngMacrosHtml(mac)}</div>
    </div>`;
  }).join('');
  attachDecimalFix();
  updateRecetteTotals();
}
function updateRecetteTotals(){
  let tK=0,tP=0,tG=0,tL=0;
  _recetteEdit.ingredients.forEach(ing=>{
    if(ing.foodId&&ing.grams){const mac=cmFromGrams(ing.foodId,ing.grams);tK+=mac.kcal;tP+=mac.prot;tG+=mac.gluc;tL+=mac.lip;}
  });
  document.getElementById('recette-total-kcal').textContent=n0(tK);
  document.getElementById('recette-total-prot').textContent=n0(tP);
  document.getElementById('recette-total-gluc').textContent=n0(tG);
  document.getElementById('recette-total-lip').textContent=n0(tL);
}
// Met à jour uniquement la ligne concernée + les totaux, sans reconstruire la
// liste : l'input/select actif ne perd jamais le focus (clavier iOS reste ouvert).
// `which` précise le jumeau (grams|kcal) à rafraîchir — jamais celui en cours de frappe.
function updateRecetteIngredientRow(lid,which){
  const ing=_recetteEdit.ingredients.find(i=>i.id===lid);
  if(!ing)return;
  const food=gf(ing.foodId);
  const mac=ing.foodId&&ing.grams?cmFromGrams(ing.foodId,ing.grams):null;
  const box=document.getElementById(`rmac-${lid}`);
  if(box){box.style.display=mac?'grid':'none';box.innerHTML=recIngMacrosHtml(mac);}
  if(which==='kcal'){
    const el=document.querySelector(`.kcal-input[data-lid="${lid}"]`);
    if(el){
      const canKcal=!!(food&&food.kcal>0);
      el.disabled=!canKcal;
      el.value=canKcal&&ing.grams?n0(ing.grams/100*food.kcal):'';
    }
  }else if(which==='grams'){
    const el=document.querySelector(`.grams-input[data-lid="${lid}"]`);
    if(el)el.value=ing.grams||'';
  }
  updateRecetteTotals();
}
function addRecetteIngredient(cat){
  _recetteEdit.ingredients.push({id:'ri_'+Math.random().toString(36).slice(2),foodId:null,cat,grams:0});
  renderRecetteIngredients();
}
function removeRecetteIngredient(lid){
  _recetteEdit.ingredients=_recetteEdit.ingredients.filter(i=>i.id!==lid);
  renderRecetteIngredients();
}
function onRecIngFood(sel){
  const ing=_recetteEdit.ingredients.find(i=>i.id===sel.dataset.lid);
  if(ing){ing.foodId=sel.value||null;updateRecetteIngredientRow(sel.dataset.lid,'kcal');}
}
function onRecIngGrams(inp){
  const ing=_recetteEdit.ingredients.find(i=>i.id===inp.dataset.lid);
  if(ing){ing.grams=parseDecimal(inp.value);updateRecetteIngredientRow(inp.dataset.lid,'kcal');}
}
// Champ kcal (dérivé) modifié → recalcule et sauvegarde les grammes correspondants
function onRecIngKcal(inp){
  const ing=_recetteEdit.ingredients.find(i=>i.id===inp.dataset.lid);
  if(!ing)return;
  const food=gf(ing.foodId);
  if(!food||!food.kcal)return; // désactivé dans ce cas, garde-fou
  const k=parseDecimal(inp.value);
  ing.grams=Math.round((k/food.kcal)*100*10)/10;
  updateRecetteIngredientRow(inp.dataset.lid,'grams');
}

async function pickRecettePhoto(e){
  if(e.target.closest('#btn-delete-recette-photo'))return;
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*,image/heic,image/heif';
  inp.onchange=async()=>{
    const file=inp.files[0];if(!file)return;
    if(!_recetteEdit.id)_recetteEdit.id='recipe_'+Date.now();
    const recipeId=_recetteEdit.id;
    const localId=`recette_photo_${recipeId}`;
    document.getElementById('recette-photo-placeholder').textContent='⏳ Envoi…';
    // Toujours sauvegarder en local d'abord (filet de sécurité)
    const localDataUrl=await fileToDataURL(file);
    await dbPut(localId,localDataUrl);
    const tokenOK=S.driveToken&&!isGoogleTokenExpired();
    if(tokenOK){
      try{
        const compressed=await compressPhoto(file);
        const fileId=await uploadPhotoToDrive(compressed,`recette_${recipeId}_${Date.now()}.jpg`);
        _recetteEdit.photoId=fileId;_recetteEdit.photoLocal=false;_recetteEdit._pendingLocalPhoto=null;
        await cachePhoto(fileId,compressed,Date.now());
        removeFromPendingUploads(localId);
        setRecettePhotoPreview(URL.createObjectURL(compressed));
      }catch(err){
        console.warn('Upload photo recette:',err);
        _recetteEdit.photoId=null;_recetteEdit.photoLocal=true;_recetteEdit._pendingLocalPhoto=localDataUrl;
        addToPendingUploads(localId,'recette',recipeId,null);
        setRecettePhotoPreview(localDataUrl,true);
      }
    }else{
      _recetteEdit.photoId=null;_recetteEdit.photoLocal=true;_recetteEdit._pendingLocalPhoto=localDataUrl;
      addToPendingUploads(localId,'recette',recipeId,null);
      setRecettePhotoPreview(localDataUrl,true);
    }
  };inp.click();
}
function deleteRecettePhoto(){
  if(_recetteEdit.photoId)driveDeleteFile(_recetteEdit.photoId);
  if(_recetteEdit.id)removeFromPendingUploads(`recette_photo_${_recetteEdit.id}`);
  _recetteEdit.photoId=null;_recetteEdit.photoLocal=false;_recetteEdit._pendingLocalPhoto=null;
  document.getElementById('recette-photo-placeholder').textContent='📷 Ajouter une photo';
  document.getElementById('recette-photo-placeholder').style.display='block';

async function saveRecette(){
  const name=document.getElementById('recette-name').value.trim();
  if(!name){alert('Le nom de la recette est obligatoire.');return;}
  const note=document.getElementById('recette-note').value;
  let tK=0,tP=0,tG=0,tL=0;
  const ingredients=_recetteEdit.ingredients.filter(i=>i.foodId&&i.grams>0).map(i=>{
    const f=gf(i.foodId);const mac=cmFromGrams(i.foodId,i.grams);
    tK+=mac.kcal;tP+=mac.prot;tG+=mac.gluc;tL+=mac.lip;
    return{foodId:i.foodId,foodName:f?.name||'',category:i.cat,grams:i.grams,kcal:mac.kcal,prot:mac.prot,gluc:mac.gluc,lip:mac.lip};
  });
  if(_recetteEdit.photoLocal&&_recetteEdit._pendingLocalPhoto){
    const photoKey=_recetteEdit.id||('recipe_'+Date.now());
    await dbPut(`recette_photo_${photoKey}`,_recetteEdit._pendingLocalPhoto);
    if(!_recetteEdit.id)_recetteEdit.id=photoKey;
  }
  const now=Date.now();
  if(_recetteEdit.id&&S.recettes.find(r=>r.id===_recetteEdit.id)){
    const r=S.recettes.find(r=>r.id===_recetteEdit.id);
    Object.assign(r,{name,note,photoId:_recetteEdit.photoId,photoLocal:_recetteEdit.photoLocal,ingredients,
      totalKcal:tK,totalProt:tP,totalGluc:tG,totalLip:tL,updatedAt:now});
  }else{
    S.recettes.push({id:_recetteEdit.id||('recipe_'+now),name,note,photoId:_recetteEdit.photoId,photoLocal:_recetteEdit.photoLocal,
      ingredients,totalKcal:tK,totalProt:tP,totalGluc:tG,totalLip:tL,createdAt:now,updatedAt:now});
  }
  saveLocal();
  closeRecetteDetail();
  renderRecettes();
}

function wkFields(i,w){
  const wt=parseDecimal(w.weight);
  let macroBlock='';
  if(wt>0){
    const obj=w.objective||S.settings.objective||'Prise de masse';
    const coef=getCoefs()[obj]||DEFAULT_COEFS['Maintien'];
    const P=Math.round(wt*coef);const L=Math.round(wt*getLipCoef());
    const G_ON=calculateGlucides(parseDecimal(w.kcalOn),P,L);
    const G_OFF=calculateGlucides(parseDecimal(w.kcalOff),P,L);
    macroBlock=`<div class="week-macros-auto">
      <div class="wma-item"><div class="wma-val pc">${P}g</div><div class="wma-lbl">Prot cible</div></div>
      <div class="wma-item"><div class="wma-val lc">${L}g</div><div class="wma-lbl">Lip cible</div></div>
      <div class="wma-item"><div class="wma-val gc">${G_ON}g</div><div class="wma-lbl">Gluc ON</div></div>
      <div class="wma-item"><div class="wma-val gc">${G_OFF}g</div><div class="wma-lbl">Gluc OFF</div></div>
    </div>`;
  }
  return macroBlock+`
  <div class="hist-row"><span class="hist-lbl">Date</span>
    <input class="hist-inp set-date" type="date" value="${w.dateRaw||''}" onchange="updWk(${i},'dateRaw',this.value);updWk(${i},'date',this.value)"></div>
  <div class="hist-row"><span class="hist-lbl">Poids (kg)</span>
    <input class="hist-inp" type="text" inputmode="decimal" pattern="[0-9.,]*" value="${w.weight||''}" placeholder="0,0" onchange="updWk(${i},'weight',this.value)"></div>
  <div class="hist-row"><span class="hist-lbl">Tour de taille (cm)</span>
    <input class="hist-inp" type="text" inputmode="decimal" pattern="[0-9.,]*" value="${w.waist||''}" placeholder="0" onchange="updWk(${i},'waist',this.value)"></div>
  <div class="hist-row"><span class="hist-lbl">Objectif</span>
    <select class="hist-sel" onchange="updWk(${i},'objective',this.value)">
      ${['Prise de masse','Maintien','Sèche'].map(o=>`<option${w.objective===o?' selected':''}>${o}</option>`).join('')}
    </select></div>
  ${['kcalOn:Kcal ON réelles','kcalOff:Kcal OFF réelles','protOn:Prot ON (g)','glucOn:Gluc ON (g)','lipOn:Lip ON (g)','protOff:Prot OFF (g)','glucOff:Gluc OFF (g)','lipOff:Lip OFF (g)'].map(s=>{const[f,l]=s.split(':');return`<div class="hist-row"><span class="hist-lbl">${l}</span><input class="hist-inp" type="text" inputmode="decimal" pattern="[0-9.,]*" value="${w[f]||''}" placeholder="0" onchange="updWk(${i},'${f}',this.value)"></div>`}).join('')}`;
}

function togWk(i){document.getElementById('wk-'+i)?.classList.toggle('open')}
function addWeek(){S.history.push({date:'',dateRaw:'',weight:'',waist:'',objective:S.settings.objective||'Prise de masse'});saveLocal();renderHistory()}
// Gluc = (kcal réelles de la carte - Prot×4 - Lip×9) / 4. Jamais 0/vide → 0. Jamais négatif → 0.
function calculateGlucides(kcalReelles,protG,lipG){
  if(!kcalReelles||kcalReelles<=0)return 0;
  const gluc=(kcalReelles-protG*4-lipG*9)/4;
  return Math.max(0,Math.round(gluc));
}
function autoFillWeekMacros(i){
  const w=S.history[i];const wt=parseDecimal(w.weight);
  if(wt<=0)return;
  const obj=w.objective||S.settings.objective||'Prise de masse';
  const coef=getCoefs()[obj]||DEFAULT_COEFS['Maintien'];
  const P=Math.round(wt*coef),L=Math.round(wt*getLipCoef());
  const G_ON=calculateGlucides(parseDecimal(w.kcalOn),P,L);
  const G_OFF=calculateGlucides(parseDecimal(w.kcalOff),P,L);
  w.protOn=P;w.lipOn=L;w.glucOn=G_ON;
  w.protOff=P;w.lipOff=L;w.glucOff=G_OFF;
}
function updWk(i,f,v){
  if(!S.history[i])return;
  S.history[i][f]=v;
  // For date display, convert YYYY-MM-DD to display format
  if(f==='dateRaw'&&v){S.history[i].date=v;}
  const triggersRecalc=['weight','objective','kcalOn','kcalOff'].includes(f);
  if(triggersRecalc)autoFillWeekMacros(i);
  saveLocal();
  if(triggersRecalc){
    // refresh the macro block + fields in this week card
    const body=document.querySelector(`#wk-${i} .week-body`);
    if(body)body.innerHTML=wkFields(i,S.history[i]);
    attachDecimalFix();
    setTimeout(drawChart,100);
    // update date label
    const lbl=document.querySelector(`#wk-${i} .week-date-lbl`);
    if(lbl)lbl.textContent=S.history[i].date?fmtDate(S.history[i].date):'— date —';
    const wlbl=document.querySelector(`#wk-${i} .week-wt-lbl`);
    if(wlbl)wlbl.textContent=v&&f==='weight'?v+' kg':(S.history[i].weight?S.history[i].weight+' kg':'Poids non renseigné');
  }
  if(f==='date'||f==='dateRaw'){
    const lbl=document.querySelector(`#wk-${i} .week-date-lbl`);
    if(lbl&&v)lbl.textContent=fmtDate(v);
    setTimeout(drawChart,100);
  }
}

function initWeekSwipes(){
  document.querySelectorAll('.week-outer').forEach(outer=>{
    let sx=0;

    outer.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-sx;

      else if(dx>10)outer.classList.remove('swipe-open');

    if(!e.target.closest('.week-outer'))document.querySelectorAll('.week-outer.swipe-open').forEach(r=>r.classList.remove('swipe-open'));

    const tokenOK=S.driveToken&&!isGoogleTokenExpired();

      try{
        const compressed=await compressPhoto(file);

        setPhotoRef(slotKey,fileId);
        await cachePhoto(fileId,compressed,Date.now());

async function removePhoto(k,pi){
  showConfirm('Supprimer cette photo ?',async()=>{
    const slotKey=`${k}_${pi}`;
    const localId=`photo_${k}_${pi}`;
    const refs=getPhotoRefs();
    const fileId=refs[slotKey];
    if(fileId){
      deletePhotoRef(slotKey);
      driveDeleteFile(fileId); // best-effort, non bloquant
    }
    removeFromPendingUploads(localId);

    saveLocal();

async function loadPhotos(){
  const refs=getPhotoRefs();
  for(const sl of document.querySelectorAll('.photo-slot[id^="ps-"]')){
    const m=sl.id.match(/^ps-(.+)-(\d)$/);if(!m)continue;
    const slotKey=`${m[1]}_${m[2]}`;
    const localId=`photo_${m[1]}_${m[2]}`;
    const fileId=refs[slotKey];
    if(fileId){
      const url=await loadPhoto(fileId);
      if(url)sl.innerHTML=`<img src="${url}" alt=""><button class="photo-trash" onclick="event.stopPropagation();removePhoto('${m[1]}',${m[2]})">🗑️</button>`;
      continue;
    }
    // Fallback : photo stockée localement (pas encore sur Drive, ou avant l'intégration Drive)
    const d=await dbGet(localId);
    if(d)sl.innerHTML=`<img src="${d}" alt=""><button class="photo-trash" onclick="event.stopPropagation();removePhoto('${m[1]}',${m[2]})">🗑️</button>${pendingBadgeHtml(localId)}`;

function drawChart(){
  const canvas=document.getElementById('weight-chart');if(!canvas)return;
  const entries=S.history.filter(w=>w.weight&&(w.dateRaw||w.date)).sort((a,b)=>(a.dateRaw||a.date).localeCompare(b.dateRaw||b.date));
  const ctx=canvas.getContext('2d');const W=canvas.offsetWidth||320,H=160;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);ctx.clearRect(0,0,W,H);
  if(entries.length<2){ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='13px -apple-system';ctx.textAlign='center';ctx.fillText('Ajoutez au moins 2 semaines avec poids et date',W/2,H/2);return;}
  const ws=entries.map(e=>parseDecimal(e.weight));
  const mn=Math.min(...ws)-1,mx=Math.max(...ws)+1;
  const p={l:38,r:12,t:14,b:26};const cW=W-p.l-p.r,cH=H-p.t-p.b;
  const xf=i=>p.l+i/(entries.length-1)*cW,yf=w=>p.t+cH-(w-mn)/(mx-mn)*cH;
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=p.t+cH/4*i;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();ctx.fillStyle='rgba(255,255,255,.32)';ctx.font='10px -apple-system';ctx.textAlign='right';ctx.fillText(nf(mx-(mx-mn)/4*i,1),p.l-2,y+4);}
  const gr=ctx.createLinearGradient(0,p.t,0,H-p.b);gr.addColorStop(0,'rgba(48,209,88,.45)');gr.addColorStop(1,'rgba(48,209,88,0)');
  ctx.beginPath();ctx.moveTo(xf(0),yf(ws[0]));entries.forEach((_,i)=>{if(i>0)ctx.lineTo(xf(i),yf(ws[i]))});
  ctx.lineTo(xf(entries.length-1),H-p.b);ctx.lineTo(xf(0),H-p.b);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();ctx.moveTo(xf(0),yf(ws[0]));entries.forEach((_,i)=>{if(i>0)ctx.lineTo(xf(i),yf(ws[i]))});
  ctx.strokeStyle='#30D158';ctx.lineWidth=2.5;ctx.stroke();
  entries.forEach((e,i)=>{const x=xf(i),y=yf(ws[i]);ctx.beginPath();ctx.arc(x,y,4.5,0,Math.PI*2);ctx.fillStyle='#30D158';ctx.fill();ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 9px -apple-system';ctx.textAlign='center';ctx.fillText(nf(ws[i],1),x,y-8);const d=e.dateRaw||e.date||'';const lbl=d.length===10?d.slice(5).replace('-','/'):d.slice(0,5);ctx.fillStyle='rgba(255,255,255,.38)';ctx.font='8px -apple-system';ctx.fillText(lbl,x,H-p.b+10);});
}

// ─── RENOUVELLEMENT SILENCIEUX DU TOKEN (expire au bout d'1h) ─────────────────
function isGoogleTokenExpired(){
  const loginTime=parseInt(localStorage.getItem('fv_drive_token_time')||'0');
  if(!loginTime)return true;
  const elapsed=(Date.now()-loginTime)/1000;
  return elapsed>3400; // renouveler 200s avant l'expiration réelle (3600s)
}
// Primitive bas niveau : tente un renouvellement sans popup (prompt:''), avec
// un timeout de sécurité (hors réseau / Google ne répond pas).
function silentTokenRefresh(){
  return new Promise(resolve=>{
    if(!gsiReady){resolve(false);return;}
    let done=false;
    const finish=ok=>{if(done)return;done=true;resolve(ok)};
    try{
      google.accounts.oauth2.initTokenClient({
        client_id:GOOGLE_CLIENT_ID,scope:DRIVE_SCOPE,prompt:'',
        callback:r=>{
          if(r.error||!r.access_token){finish(false);return;}
          S.driveToken=r.access_token;
          localStorage.setItem('fv_drive_token',r.access_token);
          localStorage.setItem('fv_drive_token_time',String(Date.now()));
          localStorage.setItem('driveConnected','true');
          finish(true);
        },
        error_callback:()=>finish(false)
      }).requestAccessToken({prompt:''});
      setTimeout(()=>finish(false),5000);
    }catch(e){finish(false)}
  });
}
function ensureValidGoogleToken(){
  if(!S.driveToken)return Promise.resolve(false);
  if(!isGoogleTokenExpired())return Promise.resolve(true);
  return silentTokenRefresh();
}
